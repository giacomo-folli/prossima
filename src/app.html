<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<link rel="icon" href="/prossima/logo.png" />

	<title>Prossima</title>

	<!-- PWA Manifest & Standard Theme Color -->
	<link rel="manifest" href="/prossima/manifest.json">
	<meta name="theme-color" content="#ffffff">

	<!-- iOS Specific Meta Tags -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="Prossima">

	<!-- iOS Icon (180x180, NO transparency) -->
	<link rel="apple-touch-icon" href="/prossima/apple_logo.png">

	<!-- Open Graph Tags -->
	<meta property="og:title" content="Prossima">
	<meta property="og:description" content="Track your training progress.">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://giacomo-folli.github.io/prossima/">
	<meta property="og:image" content="https://giacomo-folli.github.io/prossima/logo.png">

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
