<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/prossima/icon-512.png">
  <title>Prossima</title>

  <!-- PWA Manifest & Standard Theme Color -->
  <link rel="manifest" href="/prossima/manifest.json">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

  <!-- iOS Specific Meta Tags -->
  <meta name="apple-mobile-web-app-title" content="Prossima">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- iOS Icon (180x180, NO transparency) -->
  <link rel="apple-touch-icon" href="/prossima/icon-180.png">

  <!-- Open Graph Tags -->
  <meta property="og:title" content="Prossima">
  <meta property="og:description" content="Track your training progress.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://giacomo-folli.github.io/prossima/">
  <meta property="og:image" content="https://giacomo-folli.github.io/prossima/icon-512.png">

  %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
